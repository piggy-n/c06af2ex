name: Update SSQ Data

on:
  workflow_dispatch:
  schedule:
    # 北京时间每周二、四、日 22:00、22:30 执行。
    - cron: '0,30 14 * * 2,4,0'
    # 北京时间每周二、四、日 23:00 执行。
    - cron: '0 15 * * 2,4,0'

permissions:
  contents: write

jobs:
  update-ssq:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update SSQ data
        run: pnpm update:ssq

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain src/pages/data.js)" ]; then
            CURRENT_ID=$(cat .ssq-current-id)
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/pages/data.js
            git commit -m "$CURRENT_ID"
            git push
          else
            echo "No changes to commit"
          fi
